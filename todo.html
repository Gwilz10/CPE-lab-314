<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    
    <div class="container">
        <h1>24/EG/CO/155</h1>
        <div class="header">
            <h1>Tasks</h1>
            <p>a place for your to-dos</p>
        </div>

        <div class="input-area">
            <input type="text" id="task" placeholder="Type something...">
            <button id="add-btn">add task</button>
        </div>

        <div class="list-container">
            <ul id="list">

            </ul>
        </div>

        <div class="footer-note">
            <p>click a task to complete/delete when done</p>
        </div>
    </div>
    <script src="todo.js"></script>
</body>
</html>
